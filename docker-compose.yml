services:
  db:
    image: pgvector/pgvector:pg16   # Postgres 16 with the pgvector extension prebuilt
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_DB: bicopilot
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:                    # backend waits until this passes
      test: ["CMD-SHELL", "pg_isready -U app -d bicopilot"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"                 # lets you connect from your laptop (e.g. DBeaver) too

  backend:
    build: ./backend
    env_file: .env                  # loads GROQ_API_KEY, JWT_SECRET, etc. into the container
    environment:
      DATABASE_URL: postgresql://app:${DB_PASSWORD:-changeme}@db:5432/bicopilot
    depends_on:
      db:
        condition: service_healthy  # don't start backend until db is ready
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app              # live code reload while you develop

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    environment:
      VITE_API_URL: http://localhost:8000   # the browser calls the API here
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules   # keep installed deps across restarts
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  pgdata:
  frontend_node_modules:
